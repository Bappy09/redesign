<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 480" role="img" aria-label="Illustration of a financial adviser">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1430"/><stop offset="1" stop-color="#1F7FD0"/>
    </linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E3055"/><stop offset="1" stop-color="#101D3F"/>
    </linearGradient>
    <linearGradient id="tie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46B6FF"/><stop offset="1" stop-color="#1F7FD0"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0C49B"/><stop offset="1" stop-color="#E0AC81"/>
    </linearGradient>
    <clipPath id="round"><rect width="420" height="480" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="420" height="480" fill="url(#bg)"/>
    <circle cx="210" cy="215" r="158" fill="#ffffff" opacity="0.07"/>
    <circle cx="210" cy="215" r="120" fill="#ffffff" opacity="0.06"/>
    <!-- floating accent dots -->
    <circle cx="70" cy="90" r="6" fill="#5BE8FF" opacity=".8"/>
    <circle cx="360" cy="130" r="9" fill="#46B6FF" opacity=".7"/>
    <circle cx="350" cy="300" r="5" fill="#5BE8FF" opacity=".7"/>

    <!-- shoulders / jacket -->
    <path d="M60 480 C60 360 128 300 210 300 C292 300 360 360 360 480 Z" fill="url(#suit)"/>
    <!-- shirt -->
    <path d="M168 305 L210 360 L252 305 L240 300 L210 320 L180 300 Z" fill="#F4F8FF"/>
    <!-- lapels -->
    <path d="M178 302 L210 360 L188 304 Z" fill="#16233F"/>
    <path d="M242 302 L210 360 L232 304 Z" fill="#16233F"/>
    <!-- tie -->
    <path d="M210 320 L222 340 L210 430 L198 340 Z" fill="url(#tie)"/>
    <path d="M200 318 L210 332 L220 318 L210 312 Z" fill="#1763B6"/>

    <!-- neck -->
    <path d="M188 262 h44 v40 q-22 14 -44 0 Z" fill="#E0AC81"/>
    <!-- head -->
    <ellipse cx="210" cy="198" rx="66" ry="76" fill="url(#skin)"/>
    <!-- ears -->
    <circle cx="146" cy="205" r="12" fill="#E0AC81"/><circle cx="274" cy="205" r="12" fill="#E0AC81"/>
    <!-- hair -->
    <path d="M144 196 C140 120 200 96 210 96 C220 96 280 120 276 196 C276 196 270 168 250 158 C236 176 184 176 170 158 C150 168 144 196 144 196 Z" fill="#2A2F3A"/>
    <!-- eyebrows -->
    <rect x="166" y="182" width="34" height="6" rx="3" fill="#2A2F3A"/>
    <rect x="220" y="182" width="34" height="6" rx="3" fill="#2A2F3A"/>
    <!-- glasses -->
    <g fill="none" stroke="#16233F" stroke-width="4">
      <rect x="160" y="190" width="44" height="34" rx="10"/>
      <rect x="216" y="190" width="44" height="34" rx="10"/>
      <path d="M204 205 h12"/><path d="M160 200 l-16 -4"/><path d="M260 200 l16 -4"/>
    </g>
    <circle cx="182" cy="207" r="4" fill="#2A2F3A"/><circle cx="238" cy="207" r="4" fill="#2A2F3A"/>
    <!-- nose + smile -->
    <path d="M210 214 q6 14 -2 22" fill="none" stroke="#C98F5E" stroke-width="3" stroke-linecap="round"/>
    <path d="M190 246 q20 18 40 0" fill="none" stroke="#B9703F" stroke-width="3.5" stroke-linecap="round"/>
  </g>
</svg>
